Train:
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  train_batch: 128
  val_batch: 1024

Model:
  name: LSTM
  module: models.lstm
  args:
    lstm_size: 32
    fc_size: 16

Loss:
  loss: MSE      # BCE, BCEWithLogits or MSE
  output: Probs  # "Logits" or "Probs"

Data:
  reg_season: False
  post_season: True
  Game:
    active: True
    total_games: 32